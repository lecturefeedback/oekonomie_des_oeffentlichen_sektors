<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dein Feedback für Öko</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  h1 {
    font-size: 26px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
  }

  button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }

  .step {
    display: none;
    animation: fade 0.4s ease;
  }

  .step.active {
    display: block;
  }

  @keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }

  .progress {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #38bdf8;
    transition: width 0.3s;
  }

.thankyou-img {
  width: 100%;
  max-width: 420px;
  height: auto;
  display: block;
  margin: 20px auto;
  border-radius: 16px;
  object-fit: cover;
}

  .quote {
    margin-top: 15px;
    font-size: 16px;
    opacity: 0.9;
    line-height: 1.4;
  }
</style>
</head>

<body>

<div class="card">

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <form id="form">

    <!-- STEP 1 -->
    <div class="step active">
      <h1>Wenn du eine Sache ändern könntest, was wäre es?</h1>
      <input name="firstthing" required />
      <button type="button" onclick="next()">Weiter</button>
    </div>

    <!-- STEP 2 -->
    <div class="step">
      <h1>Fällt dir nochwas ein?</h1>
      <input name="secondthing" required />
      <button type="submit">Absenden</button>
    </div>

    <!-- STEP 3 THANK YOU -->
    <div class="step">
      <h1>Danke für deinen Beitrag! 🚀</h1>

      <img class="thankyou-img"
           src="https://www.lookandlearn.com/history-images/preview/B/B002/B002634_Neil-Armstrong-placing-his-foot-on-the-moons-surface-on-21-July-1969.jpg"
           alt="Mondlandung Astronaut">

      <div class="quote">
        „Ein kleiner Augenblick für einen Menschen,<br>
        aber ein großer für die Universität.“
      </div>
    </div>

  </form>

</div>

<script>
let step = 0;
const steps = document.querySelectorAll(".step");
const bar = document.getElementById("bar");
const form = document.getElementById("form");

function updateBar() {
  bar.style.width = ((step) / (steps.length - 1)) * 100 + "%";
}

function next() {
  steps[step].classList.remove("active");
  step++;
  steps[step].classList.add("active");
  updateBar();
}

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  await fetch("https://formspree.io/f/xdabebzb", {
    method: "POST",
    body: formData,
    headers: { 'Accept': 'application/json' }
  });

  steps[step].classList.remove("active");
  step++;
  steps[step].classList.add("active");

  updateBar();
});
</script>
</body>
</html>
