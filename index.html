<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DEIN Feedback für Öko</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

#DESIGN
<style>
  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: all 0.4s ease;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
  }

  button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }

  .step {
    display: none;
    animation: fade 0.4s ease;
  }

  .step.active {
    display: block;
  }

  @keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }

  .progress {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #38bdf8;
    transition: width 0.3s;
  }
</style>
</head>

<body>

#INHALT DER SEITE
<div class="card"> #kasten in der mitte

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <form action="https://formspree.io/f/xdabebzb" method="POST"> #hier muss formspree url rein!!!

    <div class="step active">
      <h1>Wenn du eine Sache ändern könntest, was wäre es?</h1>
      <input name="firstthing" required />
      <button type="button" onclick="next()">Weiter</button>
    </div>

    <div class="step">
      <h1>Fällt dir nochwas ein?</h1>
      <input name="secondthing"  not required />
      <button type="submit">Absenden</button>
    </div>

  </form>

</div>

#WAS IST DAS
<script>
let step = 0;
const steps = document.querySelectorAll(".step");
const bar = document.getElementById("bar");

#LOGIK
function next() {
  steps[step].classList.remove("active");
  step++;
  steps[step].classList.add("active");
  bar.style.width = ((step) / (steps.length - 1)) * 100 + "%";
}
</script>

</body>
</html>
